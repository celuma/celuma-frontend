version: '3.8'

services:
  frontend:
    build: .
    env_file: .env
    ports:
      - "5173:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend

  backend:
    image: ghcr.io/celuma/celuma-backend:latest
    pull_policy: always
    env_file: .env
    command: bash start.sh
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - ENV=${ENV:-dev}
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: celumadb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
