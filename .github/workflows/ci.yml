name: ci

# Docker images: built and pushed to GHCR + ECR for local dev / rollback use.
# S3 + CloudFront: the actual production deployment path (Vite build → S3 sync → CF invalidation).
#
# Both paths run in parallel on each trigger:
#   push main    -> docker image (stg)  +  deploy to stg S3/CloudFront
#   push tag v*  -> docker image (prod) +  deploy to prod S3/CloudFront

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  AWS_REGION: mx-central-1

# ─────────────────────────────────────────────────────────────────────────────
# Shared Vite build (artifact consumed by both deploy jobs)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build-npm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Classify trigger
        id: classify
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - name: Vite build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api' }}
          VITE_APP_VERSION: ${{ steps.classify.outputs.version }}
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# Docker images (kept as-is for local dev / isolated testing)
# ─────────────────────────────────────────────────────────────────────────────

  docker-build-main:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write           # GHCR
      id-token: write           # AWS OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::385511156241:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image (main → GHCR + ECR stg)
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api' }}
            VITE_APP_VERSION=${{ github.sha }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:main
            ghcr.io/${{ github.repository }}:latest
            ${{ steps.login-ecr.outputs.registry }}/celuma-stg/celuma-frontend:stg-${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/celuma-stg/celuma-frontend:stg-latest
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref=${{ github.ref }}
            org.opencontainers.image.title=Main-Branch-Image
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - run: |
          echo "### Docker image published (stg)" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository }}:main" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ steps.login-ecr.outputs.registry }}/celuma-stg/celuma-frontend:stg-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ steps.login-ecr.outputs.registry }}/celuma-stg/celuma-frontend:stg-latest" >> $GITHUB_STEP_SUMMARY

  docker-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::385511156241:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract release version
        id: release_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (tag → GHCR + ECR prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api' }}
            VITE_APP_VERSION=${{ github.ref_name }}
          push: true
          no-cache: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:${{ steps.release_version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ${{ steps.login-ecr.outputs.registry }}/celuma/celuma-frontend:${{ github.ref_name }}
            ${{ steps.login-ecr.outputs.registry }}/celuma/celuma-frontend:${{ steps.release_version.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/celuma/celuma-frontend:latest
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref=${{ github.ref }}
            org.opencontainers.image.title=Release-${{ github.ref_name }}
            org.opencontainers.image.version=${{ steps.release_version.outputs.version }}

      - run: |
          echo "### Docker image published (prod)" >> $GITHUB_STEP_SUMMARY
          echo "- ghcr.io/${{ github.repository }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ steps.login-ecr.outputs.registry }}/celuma/celuma-frontend:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- ${{ steps.login-ecr.outputs.registry }}/celuma/celuma-frontend:latest" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# S3 + CloudFront deploys (the live production path)
# ─────────────────────────────────────────────────────────────────────────────

  deploy-stg:
    needs: build-npm
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: stg

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure AWS (OIDC, deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::385511156241:role/GitHubActionsECSDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve CloudFront distribution id (stg)
        id: cf
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='Celuma stg (SPA + /api proxy)'].Id | [0]" \
            --output text)
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "::error::Could not find stg CloudFront distribution"
            exit 1
          fi
          echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Sync to S3 (stg)
        run: |
          aws s3 sync dist/ s3://celuma-frontend-stg/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 cp dist/index.html s3://celuma-frontend-stg/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront (stg)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cf.outputs.dist_id }}" \
            --paths "/index.html" "/" \
            --no-cli-pager > /dev/null

      - run: echo "### Frontend deployed to stg (${{ github.sha }})" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    needs: build-npm
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: prod

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure AWS (OIDC, deploy role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::385511156241:role/GitHubActionsECSDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve CloudFront distribution id (prod)
        id: cf
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='Celuma prod (SPA + /api proxy)'].Id | [0]" \
            --output text)
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "::error::Could not find prod CloudFront distribution"
            exit 1
          fi
          echo "dist_id=$DIST_ID" >> "$GITHUB_OUTPUT"

      - name: Sync to S3 (prod)
        run: |
          aws s3 sync dist/ s3://celuma-frontend-prod/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"
          aws s3 cp dist/index.html s3://celuma-frontend-prod/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront (prod)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cf.outputs.dist_id }}" \
            --paths "/index.html" "/" \
            --no-cli-pager > /dev/null

      - run: echo "### Frontend deployed to prod (${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
